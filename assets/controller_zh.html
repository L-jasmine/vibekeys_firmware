<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeKeys 控制器</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-md bg-base-200/50 backdrop-blur-lg shadow-2xl">
        <div class="card-body">
            <h1 class="card-title text-center justify-center text-2xl mb-2">VibeKeys 控制器</h1>
            <p class="text-center text-base-content/60 text-sm mb-4">控制您的 VibeKeys MAX 设备</p>

            <!-- Status -->
            <div id="status" class="alert mb-4">
                <span>点击下方按钮连接设备</span>
            </div>

            <!-- Connect Button -->
            <button id="connectBtn" class="btn btn-primary w-full">连接 VibeKeys</button>

            <!-- Control Panel -->
            <div id="controlPanel" class="hidden space-y-4 mt-4">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">在键盘上显示文字</span>
                    </label>
                    <textarea id="displayText" class="textarea textarea-primary w-full"
                        placeholder="输入要在键盘上显示的文字..."></textarea>
                </div>
                <button id="displayBtn" class="btn btn-secondary w-full" disabled>发送到键盘</button>
            </div>

            <!-- Notification Log -->
            <div id="notificationLog" class="hidden mt-4">
                <div class="card bg-base-300">
                    <div class="card-body p-4">
                        <h3 class="card-title text-sm uppercase tracking-wider">设备通知</h3>
                        <div id="logEntries" class="space-y-1 mt-2 max-h-40 overflow-y-auto"></div>
                    </div>
                </div>
            </div>

            <p class="text-center text-xs text-base-content/50 mt-4">请确保您的浏览器支持 Web Bluetooth</p>
        </div>
    </div>

    <script>
        // Controller Service UUIDs - 与 bt_keyboard.rs 中的定义一致
        const CONTROLLER_SERVICE_UUID = '9c80ffb6-affa-4083-944a-91e34c88bd76';
        const KEYBOARD_DISPLAY_ID = 'cdaa6472-67a8-4241-93cf-145051608573';
        const KEYBOARD_NOTIFY_ID = 'd4f7e1b3-3c4d-4f4e-8e2a-8f4e5c6d7e8f';

        let device = null;
        let server = null;
        let displayCharacteristic = null;
        let notifyCharacteristic = null;

        const statusEl = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const displayBtn = document.getElementById('displayBtn');
        const controlPanel = document.getElementById('controlPanel');
        const displayText = document.getElementById('displayText');
        const notificationLog = document.getElementById('notificationLog');
        const logEntries = document.getElementById('logEntries');

        function setStatus(text, type = '') {
            statusEl.className = 'alert mb-4';
            if (type === 'connected') {
                statusEl.classList.add('alert-success');
            } else if (type === 'error') {
                statusEl.classList.add('alert-error');
            } else if (type === 'updating') {
                statusEl.classList.add('alert-info');
            } else {
                statusEl.classList.add('alert-ghost');
            }
            statusEl.innerHTML = `<span>${text}</span>`;
        }

        function addLogEntry(message) {
            const entry = document.createElement('div');
            entry.className = 'text-xs text-base-content/70 py-1 border-b border-base-content/10 last:border-0';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="text-base-content/40">[${time}]</span> ${message}`;
            logEntries.insertBefore(entry, logEntries.firstChild);

            // 只保留最近 20 条
            while (logEntries.children.length > 20) {
                logEntries.removeChild(logEntries.lastChild);
            }
        }

        connectBtn.addEventListener('click', async () => {
            try {
                setStatus('正在搜索 VibeKeys 设备...', 'updating');

                device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [CONTROLLER_SERVICE_UUID] }],
                    optionalServices: [CONTROLLER_SERVICE_UUID]
                });

                setStatus('正在连接...', 'updating');
                server = await device.gatt.connect();

                const service = await server.getPrimaryService(CONTROLLER_SERVICE_UUID);
                displayCharacteristic = await service.getCharacteristic(KEYBOARD_DISPLAY_ID);
                notifyCharacteristic = await service.getCharacteristic(KEYBOARD_NOTIFY_ID);

                // 订阅通知
                await notifyCharacteristic.startNotifications();
                notifyCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const text = new TextDecoder().decode(e.target.value);
                    console.log('设备通知:', text);
                    addLogEntry(text);
                });

                connectBtn.textContent = '已连接';
                connectBtn.disabled = true;
                controlPanel.classList.remove('hidden');
                notificationLog.classList.remove('hidden');
                setStatus('已连接到 VibeKeys MAX', 'connected');
                addLogEntry('已连接到设备');

                device.addEventListener('gattserverdisconnected', () => {
                    setStatus('设备已断开连接', 'error');
                    connectBtn.textContent = '重新连接';
                    connectBtn.disabled = false;
                    controlPanel.classList.add('hidden');
                    displayBtn.disabled = true;
                    displayCharacteristic = null;
                    notifyCharacteristic = null;
                });

            } catch (error) {
                console.error('连接错误:', error);
                setStatus('连接失败: ' + error.message, 'error');
            }
        });

        displayText.addEventListener('input', () => {
            displayBtn.disabled = !displayText.value.trim() || !displayCharacteristic;
        });

        displayBtn.addEventListener('click', async () => {
            const text = displayText.value.trim();

            if (!text) {
                setStatus('请输入文字', 'error');
                return;
            }

            try {
                displayBtn.disabled = true;
                setStatus('正在发送文字到键盘...', 'updating');

                const data = new TextEncoder().encode(text);
                await displayCharacteristic.writeValue(data);

                setStatus('文字发送成功！', 'connected');
                addLogEntry(`显示: "${text}"`);

                displayBtn.disabled = false;

            } catch (error) {
                console.error('显示错误:', error);
                setStatus('发送文字失败: ' + error.message, 'error');
                displayBtn.disabled = false;
            }
        });

        // 检查浏览器支持
        if (!navigator.bluetooth) {
            setStatus('您的浏览器不支持 Web Bluetooth', 'error');
            connectBtn.disabled = true;
        }
    </script>
</body>

</html>
